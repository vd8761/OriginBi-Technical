name: Deploy to VPS

on:
  push:
    branches:
      - develop

# Cancel any in-progress deployment for this branch when a new push arrives
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_PATH: /home/OriginBi-Technical

jobs:
  # ──────────────────────────────────────────────
  # 1. Detect which services changed
  # ──────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      frontend:           ${{ steps.filter.outputs.frontend }}
      exam_engine:        ${{ steps.filter.outputs.exam_engine }}
      tech_engine:        ${{ steps.filter.outputs.tech_engine }}
      assessment_service: ${{ steps.filter.outputs.assessment_service }}
      judge0:             ${{ steps.filter.outputs.judge0 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            exam_engine:
              - 'backend/exam-engine/**'
            tech_engine:
              - 'backend/tech-assessment-engine/**'
            assessment_service:
              - 'backend/assessment-service/**'
              - 'backend/shared/**'
              - 'backend/package.json'
              - 'backend/package-lock.json'
            judge0:
              - 'backend/judge0/**'

  # ──────────────────────────────────────────────
  # 2a. VERIFY: Frontend (lint + typecheck + tests + production build)
  # ──────────────────────────────────────────────
  verify-frontend:
    name: Verify Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Lint (zero warnings allowed)
        working-directory: ./frontend
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        working-directory: ./frontend
        run: npm run typecheck

      - name: Unit tests
        working-directory: ./frontend
        run: npm run test

      - name: Production build
        working-directory: ./frontend
        run: npm run build

  # ──────────────────────────────────────────────
  # 2b. VERIFY: Exam Engine (Go)
  # ──────────────────────────────────────────────
  verify-exam-engine:
    name: Verify Exam Engine
    needs: detect-changes
    if: needs.detect-changes.outputs.exam_engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/exam-engine/go.mod
          cache-dependency-path: backend/exam-engine/go.sum

      - name: go vet
        working-directory: ./backend/exam-engine
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend/exam-engine
          args: --timeout=5m

      - name: go test
        working-directory: ./backend/exam-engine
        run: go test ./... -race -count=1

      - name: go build (production)
        working-directory: ./backend/exam-engine
        run: go build -o /tmp/exam-engine-verify ./cmd/server

  # ──────────────────────────────────────────────
  # 2c. VERIFY: Tech Assessment Engine (Go)
  # ──────────────────────────────────────────────
  verify-tech-engine:
    name: Verify Tech Assessment Engine
    needs: detect-changes
    if: needs.detect-changes.outputs.tech_engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/tech-assessment-engine/go.mod
          cache-dependency-path: backend/tech-assessment-engine/go.sum

      - name: go vet
        working-directory: ./backend/tech-assessment-engine
        run: go vet ./...

      # tech-engine targets Go 1.26 (newer than the prebuilt golangci-lint
      # binary supports), so compile golangci-lint from source using the
      # toolchain provisioned by setup-go.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: backend/tech-assessment-engine
          args: --timeout=5m

      - name: go test
        working-directory: ./backend/tech-assessment-engine
        run: go test ./... -race -count=1

      - name: go build (production)
        working-directory: ./backend/tech-assessment-engine
        run: go build -o /tmp/tech-engine-verify ./cmd/api

  # ──────────────────────────────────────────────
  # 2d. VERIFY: Assessment Service (NestJS)
  # ──────────────────────────────────────────────
  verify-assessment-service:
    name: Verify Assessment Service
    needs: detect-changes
    if: needs.detect-changes.outputs.assessment_service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "backend/package-lock.json"

      - name: Install workspace dependencies
        working-directory: ./backend
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build shared workspace
        working-directory: ./backend
        run: npm run build --workspace=shared --if-present

      - name: Strict type-check (tsc --noEmit)
        working-directory: ./backend/assessment-service
        run: npx tsc --noEmit

      - name: Production build (nest build)
        working-directory: ./backend
        run: npm run build --workspace=assessment-service

  # ──────────────────────────────────────────────
  # 2e. VERIFY: Judge0 (compose config)
  # ──────────────────────────────────────────────
  verify-judge0:
    name: Verify Judge0
    needs: detect-changes
    if: needs.detect-changes.outputs.judge0 == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker compose config
        working-directory: ./backend/judge0
        run: docker compose config -q

  # ──────────────────────────────────────────────
  # 3. Sync code on VPS (ONLY if every required verify passed)
  # ──────────────────────────────────────────────
  sync:
    name: Sync Codebase on VPS
    needs:
      - detect-changes
      - verify-frontend
      - verify-exam-engine
      - verify-tech-engine
      - verify-assessment-service
      - verify-judge0
    # Run only when at least one service changed AND no required verify failed.
    # Skipped verify jobs (untouched services) count as success; failed ones block sync.
    if: >-
      !cancelled() &&
      !failure() &&
      (
        needs.detect-changes.outputs.frontend == 'true' ||
        needs.detect-changes.outputs.exam_engine == 'true' ||
        needs.detect-changes.outputs.tech_engine == 'true' ||
        needs.detect-changes.outputs.assessment_service == 'true' ||
        needs.detect-changes.outputs.judge0 == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest code
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}
            git fetch origin develop
            git reset --hard origin/develop
            echo "✓ Synced to $(git rev-parse --short HEAD)"

  # ──────────────────────────────────────────────
  # 4a. Deploy Frontend (Next.js → PM2)
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: [detect-changes, verify-frontend, sync]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Build and reload frontend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}/frontend
            npm ci --prefer-offline
            npm run build
            pm2 reload frontend --update-env \
              || pm2 start ${{ env.PROJECT_PATH }}/ecosystem.config.js --only frontend
            echo "✓ Frontend deployed"

  # ──────────────────────────────────────────────
  # 4b. Deploy Exam Engine (Go → systemd)
  # ──────────────────────────────────────────────
  deploy-exam-engine:
    name: Deploy Exam Engine
    needs: [detect-changes, verify-exam-engine, sync]
    if: needs.detect-changes.outputs.exam_engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Build and restart exam-engine
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}/backend/exam-engine
            go build -o exam-engine-next ./cmd/server
            mv -f exam-engine-next exam-engine
            systemctl restart exam-engine
            echo "✓ Exam Engine deployed"

  # ──────────────────────────────────────────────
  # 4c. Deploy Tech Assessment Engine (Go → systemd)
  # ──────────────────────────────────────────────
  deploy-tech-engine:
    name: Deploy Tech Assessment Engine
    needs: [detect-changes, verify-tech-engine, sync]
    if: needs.detect-changes.outputs.tech_engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Build and restart tech-assessment-engine
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}/backend/tech-assessment-engine
            go build -o tech-engine-next ./cmd/api
            mv -f tech-engine-next tech-engine
            systemctl restart tech-assessment-engine
            echo "✓ Tech Assessment Engine deployed"

  # ──────────────────────────────────────────────
  # 4d. Deploy Assessment Service (NestJS → PM2)
  # ──────────────────────────────────────────────
  deploy-assessment-service:
    name: Deploy Assessment Service
    needs: [detect-changes, verify-assessment-service, sync]
    if: needs.detect-changes.outputs.assessment_service == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Build and reload assessment-service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}/backend
            npm ci --workspaces --if-present
            npm run build --workspace=shared
            npm run build --workspace=assessment-service
            pm2 reload assessment-service --update-env \
              || pm2 start ${{ env.PROJECT_PATH }}/ecosystem.config.js --only assessment-service
            echo "✓ Assessment Service deployed"

  # ──────────────────────────────────────────────
  # 4e. Deploy Judge0 (Docker Compose)
  # ──────────────────────────────────────────────
  deploy-judge0:
    name: Deploy Judge0
    needs: [detect-changes, verify-judge0, sync]
    if: needs.detect-changes.outputs.judge0 == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Update Judge0 containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ${{ env.PROJECT_PATH }}/backend/judge0
            docker compose up -d --remove-orphans
            docker compose ps
            echo "✓ Judge0 deployed"
