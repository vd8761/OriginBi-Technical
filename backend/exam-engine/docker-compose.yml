services:
  db:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_USER: exam
      POSTGRES_PASSWORD: exam
      POSTGRES_DB: exam
    ports:
      - "55432:5432"
    volumes:
      - exam_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam -d exam"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  engine:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://exam:exam@db:5432/exam?sslmode=disable
      HTTP_ADDR: ":8080"
      LOG_LEVEL: info
    ports:
      - "8088:8080"
    restart: unless-stopped

volumes:
  exam_db_data:
